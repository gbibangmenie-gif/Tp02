<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InfoTech Gabon - Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="principal">
    <a class="logo" href="index.html">InfoTech Gabon</a>
    <nav aria-label="Navigation principale">
      <ul>
        <li><a href="index.html">Accueil</a></li>
        <li><a href="about.html">A propos</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a class="actif" href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <section>
      <h2>Contactez-nous</h2>

      <div class="infos-contact">
        <p><strong>Adresse :</strong> Quartier Batterie IV, Libreville, Gabon</p>
        <p><strong>Telephone :</strong> +241 01 02 03 04</p>
        <p><strong>Email :</strong> contact@infotech-gabon.ga</p>
      </div>

      <form class="formulaire-contact" action="#" method="post">

        <div class="champ">
          <label for="nom">Nom complet</label>
          <input type="text" id="nom" name="nom" required>
        </div>

        <div class="champ">
          <label for="email">Adresse email</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="champ">
          <label for="telephone">Telephone</label>
          <input type="tel" id="telephone" name="telephone" placeholder="+241 01 02 03 04">
        </div>

        <div class="champ">
          <label for="sujet">Sujet</label>
          <select id="sujet" name="sujet" required>
            <option value="">Choisissez un sujet</option>
            <option value="site-web">Creation de site web</option>
            <option value="maintenance">Maintenance informatique</option>
            <option value="formation">Formation</option>
            <option value="autre">Autre</option>
          </select>
        </div>

        <div class="champ">
          <label for="message">Votre message</label>
          <textarea id="message" name="message" required></textarea>
        </div>

        <div class="champ champ-case">
          <input type="checkbox" id="accord" name="accord" required>
          <label for="accord">J'accepte d'etre recontacte par InfoTech Gabon</label>
        </div>

        <button class="bouton" type="submit">Envoyer le message</button>

      </form>
    </section>

  </main>

  <footer class="principal">
    <p>Copyright 2026 InfoTech Gabon</p>
    <ul>
      <li><a href="about.html">A propos</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </footer>

</body>
</html>
